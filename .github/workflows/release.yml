name: Release

# Primary trigger: push a version tag  →  git tag v1.2.3 && git push origin v1.2.3
# Escape hatch:    run manually from the GitHub Actions UI (no GitHub Release created)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & publish signed release APK
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ------------------------------------------------------------------ #
      # Derive VERSION_NAME and VERSION_CODE from the triggering ref.        #
      #   Tag push (v1.2.3)  →  VERSION_NAME=1.2.3  VERSION_CODE=<run#>     #
      #   workflow_dispatch   →  VERSION_NAME=manual-YYYYMMDD               #
      # github.run_number is a monotonically increasing integer that starts  #
      # at 1 and never resets — safe to use as Android versionCode.         #
      # ------------------------------------------------------------------ #
      - name: Set version
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == v* ]]; then
            echo "VERSION_NAME=${TAG#v}" >> $GITHUB_ENV
          else
            echo "VERSION_NAME=manual-$(date +%Y%m%d)" >> $GITHUB_ENV
          fi
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV

      # ------------------------------------------------------------------ #
      # Signing — requires four repository secrets:                          #
      #   KEYSTORE_BASE64   base64-encoded .jks file                         #
      #     encode with:  base64 -w 0 kraken-release.jks                    #
      #   KEYSTORE_PASSWORD  keystore password                               #
      #   KEY_ALIAS          key alias inside the keystore                   #
      #   KEY_PASSWORD       key password                                    #
      # ------------------------------------------------------------------ #
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      # Build both the APK (for GitHub Releases / sideloading) and the AAB
      # (Android App Bundle, required by Google Play Store).
      # Both are signed with the same upload keystore configured above.
      - name: Build signed release APK + AAB
        run: ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          VERSION_CODE: ${{ env.VERSION_CODE }}

      # Always remove the decoded keystore from disk after the build
      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

      # Upload the APK artifact (GitHub Releases + direct sideloading)
      - name: Upload release APK as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: kraken-bridge-${{ env.VERSION_NAME }}-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Upload the AAB artifact (Google Play Store upload)
      # To publish: go to Play Console → Production → Create new release → upload this .aab
      - name: Upload release AAB as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: kraken-bridge-${{ env.VERSION_NAME }}-playstore-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # Note: no separate mapping.txt upload step. The R8 mapping file is
      # bundled into the AAB at BUNDLE-METADATA/com.android.tools.build.obfuscation/proguard.map
      # (automatic for AGP >= 4.1). Play Console extracts it directly from the
      # uploaded bundle, so a separate artifact would be redundant.

      # Only publish a GitHub Release when triggered by a tag push (not workflow_dispatch)
      # The APK is attached for direct download / sideloading by end-users.
      # The AAB is NOT attached to the GitHub Release (it is for Play Store upload only).
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
