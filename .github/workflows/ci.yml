name: CI

# Triggers on every branch push and on PRs targeting main. Tag pushes go to
# release.yml (which produces the canonical Play Store build); this CI workflow
# produces a release-capable signed APK + AAB on every commit so any green
# build can be promoted to the Play Store without an extra rebuild.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Build signed release APK + AAB ─────────────────────────────────
  # Produces the same artifact shape as release.yml but with a non-shipping
  # version name (ci-<shortsha>) so it can never be confused with a tagged
  # release. VERSION_CODE uses ci.yml's github.run_number directly — this
  # counter is per-workflow, NOT shared with release.yml. release.yml adds
  # a +100 offset to keep tagged releases above the CI range (CI artifacts
  # are for sideload/QA, releases ship to Play Store).
  build:
    name: Build signed release APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "VERSION_NAME=ci-$SHORT_SHA" >> $GITHUB_ENV
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Build signed release APK + AAB
        run: ./gradlew assembleRelease bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
          VERSION_CODE: ${{ env.VERSION_CODE }}

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

      - name: Upload release APK
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: kraken-bridge-${{ env.VERSION_NAME }}-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Upload release AAB
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: kraken-bridge-${{ env.VERSION_NAME }}-playstore-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 14

  # ── Job 2: BDD instrumented tests on Android emulator ─────────────────────
  #
  # Runs all Cucumber scenarios except those tagged @device-only or @manual.
  # @device-only scenarios require a real device with Google Camera + Google
  # Photos installed and are excluded here.
  #
  # Uses a debug build because R8 minification (enabled in release) would
  # break instrumentation test discovery and accessibility-tree assertions.
  # The release artifact correctness is covered by Job 1 (assembleRelease).
  bdd-tests:
    name: BDD instrumented tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Enable KVM for hardware acceleration
        # Required for x86_64 emulator on Linux GitHub Actions runners
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run BDD tests on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          # The script lives in its own file because android-emulator-runner may
          # execute each line as a separate shell invocation, breaking multi-line
          # constructs (if/fi, variable capture, line continuations).
          script: bash .github/scripts/run-bdd-tests.sh

      - name: Pull Cucumber XML reports
        if: always()
        run: |
          adb pull /sdcard/cucumber-reports/ bdd-reports/ 2>/dev/null || true

      - name: Upload BDD test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: bdd-test-results-${{ github.sha }}
          path: bdd-reports/
          retention-days: 14
