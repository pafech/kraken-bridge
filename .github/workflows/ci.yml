name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Build the debug APK ─────────────────────────────────────────────
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: kraken-bridge-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ── Job 2: Unit tests (JVM, no emulator needed) ────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: unit-test-results-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 7

  # ── Job 3: BDD instrumented tests on Android emulator ─────────────────────
  #
  # Runs all Cucumber scenarios except those tagged @device-only or @manual.
  # @device-only scenarios require a real device with Google Camera + Google
  # Photos installed and are excluded here.
  #
  # The emulator uses the google_apis target so Google Play Services (needed for
  # some intent resolutions) are available. Google Camera and the stock Google
  # Photos are NOT pre-installed on emulator images; scenarios that rely on
  # those apps are guarded by the @device-only tag.
  bdd-tests:
    name: BDD instrumented tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 17
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v5.2.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Enable KVM for hardware acceleration
        # Required for x86_64 emulator on Linux GitHub Actions runners
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | \
            sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run BDD tests on emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          # Build both APKs, install, enable the accessibility service, then run BDD scenarios.
          # Tags filter: run @smoke and any untagged scenarios; skip @device-only and @manual.
          script: |
            ./gradlew assembleDebug assembleDebugAndroidTest --no-daemon

            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb install -r app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

            # Grant the accessibility service permission via shell (runs before any test)
            adb shell settings put secure enabled_accessibility_services com.krakenbridge/com.krakenbridge.KrakenAccessibilityService
            adb shell settings put secure accessibility_enabled 1
            sleep 2

            # Run Cucumber scenarios – exclude device-only and manual tags.
            # Capture exit code: adb instrument returns non-zero on test failure or crash.
            set +e
            adb shell am instrument -w -e tags "not @device-only and not @manual" com.krakenbridge.test/io.cucumber.android.runner.CucumberAndroidJUnitRunner | tee /tmp/bdd-output.txt
            INSTRUMENT_EXIT=$?
            set -e

            # Fail on instrument exit code OR on FAILURES in output (belt and suspenders)
            if [ $INSTRUMENT_EXIT -ne 0 ]; then
              echo "::error::Instrumentation exited with code $INSTRUMENT_EXIT"
              exit 1
            fi
            if grep -q "FAILURES\|Error in" /tmp/bdd-output.txt; then
              echo "::error::BDD test failures detected in output"
              exit 1
            fi

      - name: Pull Cucumber XML reports
        if: always()
        run: |
          adb pull /sdcard/cucumber-reports/ bdd-reports/ 2>/dev/null || true

      - name: Upload BDD test results
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: bdd-test-results-${{ github.sha }}
          path: bdd-reports/
          retention-days: 14
